name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  deployments: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
      - name: Upload site build for Cloudflare
        uses: actions/upload-artifact@v4
        with:
          name: site-build
          path: ./_site
          retention-days: 1

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-cloudflare:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    steps:
      - name: Check Cloudflare credentials
        id: check
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "CLOUDFLARE_API_TOKEN not set — skipping CF Pages deploy"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Download site build
        if: steps.check.outputs.skip != 'true'
        uses: actions/download-artifact@v4
        with:
          name: site-build
          path: ./_site
      - name: Deploy to Cloudflare Pages
        if: steps.check.outputs.skip != 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./_site --project-name=claude-skills-guide --branch=main

  indexnow:
    needs: deploy
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Submit to IndexNow
        run: |
          SITE_URL="https://claudecodeguides.com"
          KEY="c4ded4558ba249bbbd828bbfd67ebe80"
          SITEMAP_URL="${SITE_URL}/sitemap.xml"

          # Fetch sitemap and extract URLs
          curl -s "$SITEMAP_URL" | grep -oP '(?<=<loc>)[^<]+' | head -10000 > /tmp/urls.txt
          URL_COUNT=$(wc -l < /tmp/urls.txt)

          if [ "$URL_COUNT" -eq 0 ]; then
            echo "No URLs found in sitemap"
            exit 0
          fi

          # Build JSON payload file (avoids argument list too long)
          jq -R -s --arg host "claudecodeguides.com" --arg key "$KEY" --arg keyloc "${SITE_URL}/${KEY}.txt" \
            '{host: $host, key: $key, keyLocation: $keyloc, urlList: (split("\n") | map(select(length > 0)))}' \
            /tmp/urls.txt > /tmp/indexnow-payload.json

          # Submit to IndexNow using file-based payload
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json" \
            -d @/tmp/indexnow-payload.json)

          echo "Submitted $URL_COUNT URLs to IndexNow (HTTP $RESPONSE)"
