title: "Claude Skills Guide"
description: "Comprehensive guides, tutorials, and comparisons for Claude AI Skills, Claude Code workflows, and AI agent productivity"
url: "https://theluckystrike.github.io"
baseurl: "/claude-skills-guide"
permalink: /:title/
theme: minima
plugins:
  - jekyll-sitemap
  - jekyll-seo-tag

# FLEET NOTE (PM1, PM2, PM3): render_with_liquid: false disables ALL Liquid
# processing for articles/. This means {{ var }} and {% tag %} appear literally.
# DO NOT add {% raw %} / {% endraw %} to articles/ — these tags will appear as
# literal text in the rendered HTML. PM2 strips them on every cycle.
defaults:
  - scope:
      path: "articles"
    values:
      layout: default
      render_with_liquid: false
