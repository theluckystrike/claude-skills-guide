<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  {% seo %}
  {% if page.date %}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Article",
    "headline": "{{ page.title | escape }}",
    "description": "{{ page.description | escape }}",
    "author": {
      "@type": "Person",
      "name": "{{ page.author | default: 'Claude Skills Guide' | escape }}",
      "url": "https://github.com/theluckystrike"
    },
    "publisher": {
      "@type": "Organization",
      "name": "Claude Skills Guide",
      "url": "https://claudecodeguides.com/",
      "logo": {
        "@type": "ImageObject",
        "url": "https://claudecodeguides.com/assets/logo.png"
      }
    },
    "datePublished": "{{ page.date | date_to_xmlschema }}",
    "dateModified": "{{ page.last_modified_at | default: page.date | date_to_xmlschema }}",
    "mainEntityOfPage": {
      "@type": "WebPage",
      "@id": "{{ page.url | absolute_url }}"
    }
  }
  </script>
  {% endif %}
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif; max-width: 780px; margin: 0 auto; padding: 24px 20px; line-height: 1.7; color: #1a1a2e; background: #fafafa; }
    h1 { font-size: 1.8rem; margin-top: 2rem; color: #0f0f23; }
    h2 { font-size: 1.35rem; margin-top: 2rem; color: #16213e; border-bottom: 1px solid #e0e0e0; padding-bottom: 0.4rem; }
    h3 { font-size: 1.1rem; color: #2d3748; }
    a { color: #1a73e8; text-decoration: none; }
    a:hover { text-decoration: underline; }
    code { background: #f0f0f0; padding: 2px 6px; border-radius: 3px; font-size: 0.9em; }
    pre { background: #1e1e2e; color: #cdd6f4; padding: 16px; border-radius: 8px; overflow-x: auto; }
    pre code { background: none; color: inherit; padding: 0; }
    table { border-collapse: collapse; width: 100%; margin: 1rem 0; }
    th, td { border: 1px solid #ddd; padding: 10px 14px; text-align: left; }
    th { background: #f5f5f5; font-weight: 600; }
    blockquote { border-left: 3px solid #1a73e8; margin: 1rem 0; padding: 0.5rem 1rem; background: #f8f9fa; }
    nav { padding: 0.8rem 0; border-bottom: 1px solid #e0e0e0; margin-bottom: 2rem; display: flex; gap: 1.5rem; flex-wrap: wrap; }
    nav a { font-weight: 500; font-size: 0.95rem; }
    footer { margin-top: 3rem; padding-top: 1rem; border-top: 1px solid #e0e0e0; color: #888; font-size: 0.82rem; line-height: 1.8; }
    footer a { color: #888; }
    .date { color: #888; font-size: 0.85rem; margin-bottom: 1.5rem; display: block; }
    @media (max-width: 600px) { body { padding: 16px 14px; } h1 { font-size: 1.5rem; } }
  </style>
</head>
<body>
  <nav><a href="/">Home</a><a href="/about/">About</a><a href="/topics/getting-started/">Getting Started</a><a href="/topics/prompt-engineering/">Prompts</a><a href="/topics/api/">API</a><a href="/topics/agents/">Agents</a></nav>
  <main>
    {% if page.date %}
    <span class="date">Last updated: {{ page.last_modified_at | default: page.date | date: "%B %d, %Y" }}</span>
    {% endif %}
    {{ content }}
  </main>
  <footer>
    <p>&copy; 2026 Claude Code Guides &middot; <a href="/about/">About</a></p>
  </footer>
</body>
</html>
