<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  {% seo %}
  {% if page.date %}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Article",
    "headline": "{{ page.title | escape }}",
    "description": "{{ page.description | escape }}",
    "author": {
      "@type": "Person",
      "name": "{{ page.author | default: 'Claude Skills Guide' | escape }}",
      "url": "https://github.com/theluckystrike"
    },
    "publisher": {
      "@type": "Organization",
      "name": "Claude Skills Guide",
      "url": "https://theluckystrike.github.io/claude-skills-guide/",
      "logo": {
        "@type": "ImageObject",
        "url": "https://theluckystrike.github.io/claude-skills-guide/assets/logo.png"
      }
    },
    "datePublished": "{{ page.date | date_to_xmlschema }}",
    "dateModified": "{{ page.last_modified_at | default: page.date | date_to_xmlschema }}",
    "mainEntityOfPage": {
      "@type": "WebPage",
      "@id": "{{ page.url | absolute_url }}"
    }
  }
  </script>
  {% endif %}
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 720px; margin: 0 auto; padding: 20px; line-height: 1.6; color: #333; }
    h1 { font-size: 1.8em; }
    h2 { font-size: 1.4em; margin-top: 2em; }
    a { color: #1a73e8; }
    footer { margin-top: 3em; padding-top: 1em; border-top: 1px solid #eee; font-size: 0.9em; color: #666; }
  </style>
</head>
<body>
  <header><a href="{{ site.baseurl }}/">{{ site.title }}</a></header>
  <main>{{ content }}</main>
  <footer>Built by theluckystrike — More tips at <a href="https://zovo.one">zovo.one</a></footer>
</body>
</html>
