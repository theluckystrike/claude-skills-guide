<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  {% seo %}
  {% if page.date %}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Article",
    "headline": "{{ page.title | escape }}",
    "description": "{{ page.description | escape }}",
    "author": {
      "@type": "Person",
      "name": "{{ page.author | default: 'Claude Skills Guide' | escape }}",
      "url": "https://github.com/theluckystrike"
    },
    "publisher": {
      "@type": "Organization",
      "name": "Claude Skills Guide",
      "url": "https://claudecodeguides.com/",
      "logo": {
        "@type": "ImageObject",
        "url": "https://claudecodeguides.com/assets/logo.png"
      }
    },
    "datePublished": "{{ page.date | date_to_xmlschema }}",
    "dateModified": "{{ page.last_modified_at | default: page.date | date_to_xmlschema }}",
    "mainEntityOfPage": {
      "@type": "WebPage",
      "@id": "{{ page.url | absolute_url }}"
    }
  }
  </script>
  {% endif %}
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; max-width: 740px; margin: 0 auto; padding: 32px 24px; line-height: 1.75; color: #1d1d1f; background: #fbfbfd; -webkit-font-smoothing: antialiased; }
    h1 { font-size: 2rem; font-weight: 700; letter-spacing: -0.025em; color: #1d1d1f; margin: 2rem 0 0.5rem; }
    h2 { font-size: 1.4rem; font-weight: 600; letter-spacing: -0.015em; color: #1d1d1f; margin: 2.5rem 0 0.75rem; padding-bottom: 0.5rem; border-bottom: 1px solid #d2d2d7; }
    h3 { font-size: 1.15rem; font-weight: 600; color: #1d1d1f; margin: 1.5rem 0 0.5rem; }
    p { margin: 0.75rem 0; color: #424245; }
    a { color: #0066cc; text-decoration: none; transition: color 0.2s; }
    a:hover { color: #0077ed; text-decoration: underline; }
    ul, ol { padding-left: 1.25rem; margin: 0.75rem 0; }
    li { margin: 0.4rem 0; color: #424245; }
    li a { font-weight: 500; }
    code { background: #f5f5f7; padding: 3px 7px; border-radius: 5px; font-size: 0.88em; font-family: 'SF Mono', SFMono-Regular, Menlo, Consolas, monospace; color: #1d1d1f; }
    pre { background: #1d1d1f; color: #f5f5f7; padding: 20px; border-radius: 12px; overflow-x: auto; line-height: 1.5; margin: 1.25rem 0; }
    pre code { background: none; color: inherit; padding: 0; font-size: 0.85em; }
    table { border-collapse: collapse; width: 100%; margin: 1.25rem 0; }
    th { background: #f5f5f7; font-weight: 600; font-size: 0.9em; text-transform: uppercase; letter-spacing: 0.03em; color: #86868b; padding: 12px 16px; text-align: left; border-bottom: 1px solid #d2d2d7; }
    td { padding: 12px 16px; border-bottom: 1px solid #e8e8ed; color: #424245; }
    blockquote { border-left: 3px solid #0066cc; margin: 1.25rem 0; padding: 0.75rem 1.25rem; background: #f5f5f7; border-radius: 0 8px 8px 0; }
    img { max-width: 100%; height: auto; border-radius: 8px; }
    nav { padding: 0.75rem 0; border-bottom: 1px solid #d2d2d7; margin-bottom: 2.5rem; display: flex; gap: 1.75rem; flex-wrap: wrap; align-items: center; }
    nav a { font-weight: 500; font-size: 0.92rem; color: #424245; transition: color 0.2s; }
    nav a:hover { color: #0066cc; text-decoration: none; }
    footer { margin-top: 4rem; padding-top: 1.5rem; border-top: 1px solid #d2d2d7; color: #86868b; font-size: 0.82rem; line-height: 2; }
    footer a { color: #86868b; }
    footer a:hover { color: #0066cc; }
    .date { color: #86868b; font-size: 0.85rem; margin-bottom: 1.75rem; display: block; }
    .card { background: #fff; border: 1px solid #d2d2d7; border-radius: 12px; padding: 20px; margin: 0.75rem 0; transition: box-shadow 0.2s; }
    .card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .card a { font-weight: 600; font-size: 1.05rem; }
    .card p { font-size: 0.9rem; color: #86868b; margin: 0.25rem 0 0; }
    @media (max-width: 600px) { body { padding: 20px 16px; } h1 { font-size: 1.6rem; } }
  </style>
</head>
<body>
  <nav>
    <a href="/" style="font-weight:700; color:#1d1d1f; font-size:1rem;">Claude Code Guides</a>
    <a href="/about/">About</a>
    <a href="/topics/getting-started/">Start</a>
    <a href="/topics/prompt-engineering/">Prompts</a>
    <a href="/topics/api/">API</a>
    <a href="/topics/agents/">Agents</a>
  </nav>
  <main>
    {% if page.date %}
    <span class="date">Last updated: {{ page.last_modified_at | default: page.date | date: "%B %d, %Y" }}</span>
    {% endif %}
    {{ content }}
  </main>
  <footer>
    <p>&copy; 2026 Claude Code Guides</p>
    <p><a href="/about/">About</a> &middot; <a href="/topics/getting-started/">Getting Started</a> &middot; <a href="/topics/prompt-engineering/">Prompts</a> &middot; <a href="/topics/api/">API</a> &middot; <a href="/topics/agents/">Agents</a></p>
  </footer>
</body>
</html>
