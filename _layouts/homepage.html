<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <main id="main-content">
    {{ content }}
  </main>
  <!-- Sticky Footer CTA Bar -->
  <aside class="cta-footer-bar" id="ctaFooterBar" aria-label="Community invitation">
    <div class="cta-footer-bar-inner">
      <span class="cta-footer-bar-text">Generate a free CLAUDE.md for your stack. 27 frameworks. 60 seconds.</span>
      <a href="/generator/?utm_source=ccg&utm_medium=footer-bar&utm_campaign=sticky" class="cta-footer-bar-btn">Generate free CLAUDE.md &#8594;</a>
      <button type="button" class="cta-footer-bar-dismiss" id="ctaFooterDismiss" aria-label="Dismiss community banner">&#10005;</button>
    </div>
  </aside>
  <script>
  (function() {
    'use strict';
    var COOKIE_NAME = 'zovo_footer_dismissed';
    var COOKIE_DAYS = 7;
    var SHOW_DELAY_MS = 5000;
    var SCROLL_THRESHOLD = 0.3;

    function getCookie(name) {
      var match = document.cookie.match(new RegExp('(?:^|;\\s*)' + name + '=([^;]*)'));
      return match ? match[1] : null;
    }

    if (getCookie(COOKIE_NAME) === '1') {
      return;
    }

    var bar = document.getElementById('ctaFooterBar');
    var dismissBtn = document.getElementById('ctaFooterDismiss');
    if (!bar || !dismissBtn) { return; }

    var shown = false;
    var timer = null;

    function showBar() {
      if (shown) { return; }
      shown = true;
      if (timer) { clearTimeout(timer); timer = null; }
      window.removeEventListener('scroll', onScroll);
      bar.style.display = 'block';
      bar.offsetHeight;
      bar.classList.add('is-visible');
    }

    function dismissBar() {
      bar.classList.remove('is-visible');
      var expires = new Date();
      expires.setTime(expires.getTime() + (COOKIE_DAYS * 24 * 60 * 60 * 1000));
      document.cookie = COOKIE_NAME + '=1;expires=' + expires.toUTCString() + ';path=/;SameSite=Lax';
      setTimeout(function() { bar.style.display = 'none'; }, 350);
    }

    dismissBtn.addEventListener('click', dismissBar, { once: true });

    function onScroll() {
      var scrollTop = window.pageYOffset || document.documentElement.scrollTop;
      var docHeight = document.documentElement.scrollHeight - window.innerHeight;
      if (docHeight > 0 && (scrollTop / docHeight) >= SCROLL_THRESHOLD) {
        showBar();
      }
    }

    window.addEventListener('scroll', onScroll, { passive: true });
    timer = setTimeout(showBar, SHOW_DELAY_MS);
  })();
  </script>
</body>
</html>
